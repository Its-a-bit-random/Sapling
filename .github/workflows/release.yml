name: publish-docs-and-draft-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    name: Publish docs and draft release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pesde
        uses: lumin-org/setup-pesde@v0.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Moonwave
        run: npm i -g moonwave@latest

      - name: Install deps
        run: pesde install

      - name: Make build script executable
        run: chmod +x bin/build.sh

      - name: Publish docs
        run: |
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git config --global user.email "support+actions@github.com"
          git config --global user.name "github-actions-bot"
          moonwave build --code packages/ --publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release assets
        run: ./bin/build.sh

      - name: Verify build directory exists
        run: |
          if [ ! -d "build" ]; then
            echo "build directory does not exist"
            exit 1
          fi

          if [ -z "$(find build -type f)" ]; then
            echo "build directory contains no files"
            exit 1
          fi

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}